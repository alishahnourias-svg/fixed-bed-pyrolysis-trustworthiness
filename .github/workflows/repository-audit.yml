name: Repository audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install audit dependency
        run: python -m pip install --upgrade pyyaml

      - name: Compile Python files
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile
          files = sorted(Path('code').rglob('*.py')) + sorted(Path('tools').rglob('*.py'))
          for path in files:
              py_compile.compile(str(path), doraise=True)
          print(f'Compiled {len(files)} Python files successfully.')
          PY

      - name: Parse metadata files
        run: |
          python - <<'PY'
          from pathlib import Path
          import json, yaml
          cff = yaml.safe_load(Path('CITATION.cff').read_text(encoding='utf-8'))
          assert cff.get('license') == 'MIT', 'CITATION.cff primary license must be MIT'
          json.loads(Path('release_metadata/PACKAGE_AUDIT.json').read_text(encoding='utf-8'))
          print('Metadata parsing passed.')
          PY

      - name: Check forbidden public files
        run: python tools/audit_public_repository.py
